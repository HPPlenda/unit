<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Unificador de Textos</title>
  
  <!-- Tailwind CSS via CDN para estilização -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Fonte Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Garantir que html e body ocupem toda a altura sem depender de dvh */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      -webkit-overflow-scrolling: touch;
    }

    #root {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Poppins', sans-serif;
      /* Evita zoom indesejado e comportamentos de toque que atrapalham */
      touch-action: manipulation;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }
    
    /* Configurações da barra de rolagem */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    
    /* Animações CSS simples para transições suaves */
    .fade-enter { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { 
      from { opacity: 0; transform: scale(0.98); } 
      to { opacity: 1; transform: scale(1); } 
    }

    /* Forçar tamanho mínimo de fonte 16px nos textareas em mobile 
       para evitar zoom automático do iOS ao focar */
    textarea {
      font-size: 16px !important;
    }

    /* Scroll mais fluido nas áreas internas */
    .scroll-area {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
  </style>

  <!-- Bibliotecas React e Babel via CDN para o funcionamento Offline/Localhost -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="h-full w-full flex flex-col bg-[#F8F9FA] overflow-hidden text-gray-900">
  
  <!-- Onde a nossa aplicação vai injetar todo o código visual -->
  <div id="root" class="h-full w-full flex flex-col"></div>

  <!-- Lógica e Interface -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Componente customizado de ícones em SVG inline. Dispensa dependência de fontes externas ou imagens.
    const Icon = ({ name, size = 24, className = "" }) => {
      const icons = {
        fileText: '<path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/>',
        history: '<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>',
        plus: '<path d="M5 12h14"/><path d="M12 5v14"/>',
        trash2: '<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>',
        eraser: '<path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/>',
        alignLeft: '<line x1="21" x2="3" y1="6" y2="6"/><line x1="15" x2="3" y1="12" y2="12"/><line x1="17" x2="3" y1="18" y2="18"/>',
        copy: '<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>',
        download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/>',
        save: '<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>',
        x: '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
        clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'
      };
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: icons[name] || "" }} />
      );
    };

    // Função para ids únicos
    const generateId = () => Math.random().toString(36).substring(2, 9);

    function TextJoinerApp() {
      const [boxes, setBoxes] = useState([
        { id: generateId(), text: "" },
        { id: generateId(), text: "" },
        { id: generateId(), text: "" },
      ]);
      const [history, setHistory] = useState([]);
      const [isHistoryOpen, setIsHistoryOpen] = useState(false);
      const [copied, setCopied] = useState(false);
      const [deleteConfirmId, setDeleteConfirmId] = useState(null);

      // Carregar histórico
      useEffect(() => {
        const saved = localStorage.getItem("textJoinerHistory");
        if (saved) {
          try {
            setHistory(JSON.parse(saved));
          } catch (e) {
            console.error("Failed to load history");
          }
        }
      }, []);

      // Salvar histórico sempre que atualizar
      useEffect(() => {
        localStorage.setItem("textJoinerHistory", JSON.stringify(history));
      }, [history]);

      const handleAddBox = () => {
        setBoxes([...boxes, { id: generateId(), text: "" }]);
      };

      const handleRemoveBox = (id) => {
        if (boxes.length <= 1) {
          setBoxes([{ id: generateId(), text: "" }]);
          return;
        }
        setBoxes(boxes.filter((box) => box.id !== id));
      };

      const handleClearBox = (id) => {
        setBoxes(boxes.map((box) => (box.id === id ? { ...box, text: "" } : box)));
      };

      const handleTextChange = (id, newText) => {
        setBoxes(
          boxes.map((box) => (box.id === id ? { ...box, text: newText } : box))
        );
      };

      const combinedText = boxes
        .map((box) => box.text)
        .filter((text) => text.trim() !== "")
        .join("\n\n");

      const saveToHistory = () => {
        if (boxes.every(b => b.text.trim() === "")) return;
        const currentCombined = boxes.map(b => b.text).filter(t => t.trim() !== "").join("\n\n");
        if (history.length > 0) {
          const latestCombined = history[0].boxes.map(b => b.text).filter(t => t.trim() !== "").join("\n\n");
          if (currentCombined === latestCombined) return;
        }
        setHistory([{ id: generateId(), boxes: [...boxes], timestamp: Date.now() }, ...history]);
      };

      const handleCopy = async () => {
        if (!combinedText) return;
        try {
          await navigator.clipboard.writeText(combinedText);
          setCopied(true);
          saveToHistory();
          setTimeout(() => setCopied(false), 2000);
        } catch (err) {
          console.error("Erro ao copiar:", err);
        }
      };

      const handleDownload = () => {
        if (!combinedText) return;
        const blob = new Blob([combinedText], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "textos_combinados.txt";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        saveToHistory();
      };

      const handleDeleteHistoryItem = (id, e) => {
        e.stopPropagation();
        setDeleteConfirmId(id);
      };

      const confirmDeleteHistory = (id, e) => {
        e.stopPropagation();
        setHistory(history.filter(item => item.id !== id));
        setDeleteConfirmId(null);
      };

      const cancelDeleteHistory = (e) => {
        e.stopPropagation();
        setDeleteConfirmId(null);
      };

      return (
        <div className="h-full w-full flex flex-col bg-[#F8F9FA] overflow-hidden fixed inset-0">
          {/* Header Superior Fixo */}
          <header className="shrink-0 bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between shadow-sm z-10">
            <div className="flex items-center gap-3">
              <div className="bg-black text-white p-1.5 rounded-lg flex items-center justify-center">
                <Icon name="fileText" size={20} />
              </div>
              <h1 className="text-lg md:text-xl font-bold tracking-tight text-black">
                Unificador de Textos
              </h1>
            </div>
            <button 
              onClick={() => setIsHistoryOpen(true)}
              className="flex items-center gap-2 text-sm font-bold text-gray-700 bg-gray-100 hover:bg-gray-200 hover:text-black px-3 py-1.5 rounded-lg transition-colors border border-gray-200 focus:outline-none focus:ring-2 focus:ring-black"
            >
              <Icon name="history" size={16} />
              <span className="hidden sm:inline">Ver Histórico</span>
            </button>
          </header>

          {/* Container Principal adaptável (sem scroll do browser) */}
          <main className="flex-1 min-h-0 flex flex-col md:flex-row w-full max-w-[1400px] mx-auto p-2 md:p-4 gap-2 md:gap-4 overflow-hidden">
            
            {/* Coluna Esquerda: Caixas Individuais */}
            <div className="flex-1 min-h-0 flex flex-col bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
              <div className="shrink-0 px-4 py-2 border-b border-gray-100 bg-gray-50 flex items-center justify-between">
                <span className="font-bold text-sm tracking-wide text-gray-700 uppercase flex items-center gap-2">
                  Partes do Texto
                  <span className="bg-gray-200 text-gray-600 text-[10px] px-2 py-0.5 rounded-full">{boxes.length}</span>
                </span>
                <button
                  onClick={handleAddBox}
                  className="flex items-center gap-1 text-xs font-bold text-white bg-black hover:bg-gray-800 px-2.5 py-1.5 rounded transition-colors focus:outline-none focus:ring-2 focus:ring-black"
                >
                  <Icon name="plus" size={14} /> Adicionar
                </button>
              </div>
              
              <div className="flex-1 min-h-0 p-2 scroll-area flex flex-col gap-2 bg-white">
                {boxes.map((box, index) => (
                  <div key={box.id} className="fade-enter flex-1 min-h-[90px] flex flex-col bg-white border border-gray-200 rounded-lg overflow-hidden focus-within:border-black focus-within:ring-1 focus-within:ring-black shadow-sm">
                    <div className="shrink-0 bg-gray-50 py-1.5 px-3 border-b border-gray-100 flex justify-between items-center transition-colors">
                      <div className="flex items-center gap-2">
                        <span className="text-[11px] font-bold text-gray-500 uppercase tracking-wider">
                          Bloco {index + 1}
                        </span>
                        <span className="text-[10px] font-mono bg-gray-200 px-1.5 py-0.5 rounded text-gray-600 font-bold">
                          {box.text.length} caracteres
                        </span>
                      </div>
                      <div className="flex items-center gap-2">
                        <button onClick={() => handleClearBox(box.id)} className="text-gray-400 hover:text-black transition-colors" title="Esvaziar Texto">
                          <Icon name="eraser" size={14} />
                        </button>
                        <button onClick={() => handleRemoveBox(box.id)} className="text-gray-400 hover:text-black transition-colors" title="Remover Bloco">
                          <Icon name="trash2" size={14} />
                        </button>
                      </div>
                    </div>
                    <textarea
                      value={box.text}
                      onChange={(e) => handleTextChange(box.id, e.target.value)}
                      placeholder="Digite ou cole um texto aqui..."
                      style={{ resize: 'none' }}
                      className="flex-1 w-full p-2 lg:p-3 outline-none text-gray-800 leading-relaxed"
                    />
                  </div>
                ))}
              </div>
            </div>

            {/* Coluna Direita: Documento Final Mesclado */}
            <div className="flex-1 min-h-0 flex flex-col bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden mt-2 md:mt-0">
              <div className="shrink-0 px-4 py-3 border-b border-gray-100 bg-black text-white flex items-center justify-between">
                <span className="font-bold text-sm flex items-center gap-2">
                  <Icon name="alignLeft" size={16} /> Documento Unificado
                </span>
                <span className="text-xs font-mono bg-gray-800 px-2 py-0.5 rounded text-gray-300">
                  {combinedText.length} caracteres
                </span>
              </div>

              <div className="flex-1 min-h-0 p-4 scroll-area bg-gray-50 flex flex-col">
                {combinedText ? (
                  <div className="flex-1 text-sm font-mono text-gray-800 whitespace-pre-wrap leading-relaxed outline-none">
                    {combinedText}
                  </div>
                ) : (
                  <div className="flex-1 flex flex-col items-center justify-center text-gray-400 gap-3">
                    <Icon name="fileText" size={32} className="text-gray-300" />
                    <p className="text-sm font-medium text-center">Os textos unidos aparecerão aqui...</p>
                  </div>
                )}
              </div>

              {/* Botões de Ações Gerais */}
              <div className="shrink-0 p-3 bg-white border-t border-gray-200 grid grid-cols-3 gap-2">
                <button
                  onClick={handleCopy}
                  disabled={!combinedText}
                  className={`flex flex-col xl:flex-row items-center justify-center gap-1 xl:gap-2 py-2 rounded-lg font-bold text-[11px] xl:text-sm transition-all outline-none focus:ring-2 focus:ring-black px-1 ${
                    !combinedText ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : copied ? 'bg-black text-white' : 'bg-gray-100 hover:bg-gray-200 text-black border border-gray-200'
                  }`}
                >
                  <Icon name="copy" size={16} />
                  <span className="truncate">{copied ? 'Copiado!' : 'Copiar'}</span>
                </button>
                <button
                  onClick={handleDownload}
                  disabled={!combinedText}
                  className={`flex flex-col xl:flex-row items-center justify-center gap-1 xl:gap-2 py-2 rounded-lg font-bold text-[11px] xl:text-sm transition-all border outline-none focus:ring-2 focus:ring-black px-1 ${
                    !combinedText ? 'bg-gray-50 text-gray-300 border-gray-100 cursor-not-allowed' : 'bg-white text-black hover:bg-gray-50 border-gray-300 shadow-sm'
                  }`}
                >
                  <Icon name="download" size={16} />
                  <span className="truncate">Baixar .txt</span>
                </button>
                <button
                  onClick={saveToHistory}
                  disabled={!combinedText}
                  className={`flex flex-col xl:flex-row items-center justify-center gap-1 xl:gap-2 py-2 rounded-lg font-bold text-[11px] xl:text-sm transition-all border outline-none focus:ring-2 focus:ring-black px-1 ${
                    !combinedText ? 'bg-gray-50 text-gray-300 border-gray-100 cursor-not-allowed' : 'bg-white text-black hover:bg-gray-50 border-gray-300 shadow-sm'
                  }`}
                >
                  <Icon name="save" size={16} />
                  <span className="truncate">Salvar Histórico</span>
                </button>
              </div>
            </div>
          </main>

          {/* Modal do Histórico em Pop-up */}
          {isHistoryOpen && (
            <div 
              className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm fade-enter" 
              onClick={() => { setIsHistoryOpen(false); setDeleteConfirmId(null); }}
            >
              <div 
                onClick={e => e.stopPropagation()} 
                className="bg-white rounded-2xl w-full max-w-xl shadow-2xl flex flex-col max-h-[85vh] overflow-hidden fade-enter"
              >
                <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100 bg-gray-50">
                  <h2 className="font-bold text-lg flex items-center gap-2 text-black">
                    <Icon name="history" size={20} /> Histórico de Textos Salvos
                  </h2>
                  <button onClick={() => { setIsHistoryOpen(false); setDeleteConfirmId(null); }} className="p-1.5 text-gray-500 hover:text-black hover:bg-gray-200 rounded-lg transition-colors">
                    <Icon name="x" size={20} />
                  </button>
                </div>
                
                <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-white">
                  {history.length === 0 ? (
                    <div className="flex flex-col items-center justify-center py-12 text-gray-400 gap-4">
                      <Icon name="clock" size={40} className="text-gray-300" />
                      <p className="text-center font-medium">Nenhuma unificação salva no momento.<br/><span className="text-sm font-normal">Sempre que você copia ou salva um arquivo, ele fica guardado aqui.</span></p>
                    </div>
                  ) : (
                    history.map((item) => {
                      const snippet = item.boxes.map(b => b.text).filter(t => t.trim() !== "").join(" ").substring(0, 150);
                      return (
                        <div 
                          key={item.id} 
                          className="group border border-gray-200 rounded-xl p-4 hover:border-black cursor-pointer transition-all bg-white hover:shadow-md relative overflow-hidden" 
                          onClick={() => { if (deleteConfirmId === item.id) return; setBoxes(item.boxes); setIsHistoryOpen(false); setDeleteConfirmId(null); }}
                        >
                          {/* Tela de confirmação de exclusão */}
                          {deleteConfirmId === item.id && (
                            <div className="absolute inset-0 bg-white/95 backdrop-blur-sm z-10 flex flex-col justify-center items-center p-4 fade-enter">
                              <p className="text-[14px] leading-tight font-bold text-gray-800 mb-3 text-center">Tem certeza que deseja excluir esse texto unificado?</p>
                              <div className="flex gap-2">
                                <button onClick={(e) => confirmDeleteHistory(item.id, e)} className="px-4 py-1.5 bg-black text-white text-[12px] font-bold rounded-lg hover:bg-red-600 transition-colors">Sim, excluir</button>
                                <button onClick={cancelDeleteHistory} className="px-4 py-1.5 bg-gray-200 text-black text-[12px] font-bold rounded-lg hover:bg-gray-300 transition-colors">Não</button>
                              </div>
                            </div>
                          )}
                          <div className="flex justify-between items-start mb-2">
                            <span className="text-xs font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded-md flex items-center gap-1">
                              <Icon name="clock" size={12}/> {new Date(item.timestamp).toLocaleString()}
                            </span>
                            <div className="flex items-center gap-2">
                              <button onClick={(e) => handleDeleteHistoryItem(item.id, e)} className="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors opacity-100 sm:opacity-0 group-hover:opacity-100" title="Excluir do Histórico">
                                <Icon name="trash2" size={16} />
                              </button>
                              <button className="text-xs font-bold bg-black text-white px-3 py-1.5 rounded-lg opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity">
                                Restaurar
                              </button>
                            </div>
                          </div>
                          <p className="text-sm text-gray-700 line-clamp-3 font-medium leading-relaxed">{snippet || "Cópia vazia..."}</p>
                          <div className="mt-3 text-[10px] font-bold text-gray-400 uppercase tracking-spacing flex items-center gap-1 border-t border-gray-100 pt-3">
                            <Icon name="fileText" size={10} /> {item.boxes.length} Partes originais preservadas
                          </div>
                        </div>
                      )
                    })
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // Inicialização da Aplicação
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TextJoinerApp />);
  </script>
</body>
</html>
