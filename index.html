          <i data-lucide="plus" class="w-3.5 h-3.5"></i> Adicionar

      </div>

      <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 bg-gray-50">
        <h2 class="font-bold text-lg flex items-center gap-2 text-black">
          <i data-lucide="history" class="w-5 h-5"></i> Histórico de Textos
        </h2>
        <button onclick="closeHistory()" class="p-1.5 text-gray-500 hover:text-black hover:bg-gray-200 rounded-lg">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div id="history-container" class="flex-1 overflow-y-auto p-4 space-y-3 bg-white"></div>
    </div>

  <script>
    const generateId = () => Math.random().toString(36).substring(2, 9);

    let boxes = [
      { id: generateId(), text: "" },
      { id: generateId(), text: "" },
      { id: generateId(), text: "" }
    ];
    let historyData = JSON.parse(localStorage.getItem('unificador_history') || '[]');
    let expandedBoxes = [];
    let expandedHistory = [];

    const saveHistoryToStorage = () => localStorage.setItem('unificador_history', JSON.stringify(historyData));

    function renderBoxes() {
      const container = document.getElementById('boxes-container');
      container.innerHTML = '';
      document.getElementById('box-count').innerText = boxes.length;

      boxes.forEach((box, index) => {
        const isExp = expandedBoxes.includes(box.id);
        const div = document.createElement('div');
        div.className = `bg-white border border-gray-200 rounded-lg overflow-hidden focus-within:border-black flex flex-col transition-all duration-200 ${isExp ? 'h-[400px] flex-none' : 'flex-1 min-h-[90px]'}`;
        
        div.innerHTML = `
          <div class="shrink-0 bg-gray-50 py-1.5 px-3 border-b border-gray-100 flex justify-between items-center">
            <div class="flex items-center gap-2">
              <button onclick="toggleBoxExpand('${box.id}')" class="text-gray-500 hover:text-black">
                <i data-lucide="${isExp ? 'minimize-2' : 'maximize-2'}" class="w-3.5 h-3.5"></i>
              </button>
              <span class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Bloco ${index + 1}</span>
              <span class="text-[10px] font-mono bg-gray-200 px-1.5 py-0.5 rounded text-gray-600 font-bold">${box.text.length} char</span>
            </div>
            <div class="flex items-center gap-2">
              <button onclick="clearBox('${box.id}')" class="text-gray-400 hover:text-black"><i data-lucide="eraser" class="w-3.5 h-3.5"></i></button>
              <button onclick="removeBox('${box.id}')" class="text-gray-400 hover:text-black"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
            </div>
          </div>
          <textarea id="ta-${box.id}" oninput="updateText('${box.id}', this.value)" placeholder="Digite aqui..." class="flex-1 w-full p-2 lg:p-3 resize-none outline-none text-gray-800 text-sm leading-relaxed">${box.text}</textarea>
        `;
        container.appendChild(div);
      });
      lucide.createIcons();
      updateResult();
    }

    function getCombinedText() { return boxes.map(b => b.text).filter(t => t.trim() !== "").join("\n\n"); }

    function updateResult() {
      const combined = getCombinedText();
      const hasText = combined.length > 0;
      
      document.getElementById('char-count').innerText = `${combined.length} caracteres`;
      document.getElementById('combined-display').innerText = combined;
      document.getElementById('combined-display').classList.toggle('hidden', !hasText);
      document.getElementById('empty-state').classList.toggle('hidden', hasText);

      // Atualiza estado dos botões
      const btnClassAct = "bg-white text-black hover:bg-gray-50 border-gray-300 shadow-sm border";
      const btnClassDis = "bg-gray-50 text-gray-300 border-gray-100 cursor-not-allowed border";
      
      const btnC = document.getElementById('btn-copy');
      const btnD = document.getElementById('btn-download');
      
      btnC.className = `flex flex-col xl:flex-row items-center justify-center gap-1 xl:gap-2 py-2 rounded-lg font-bold text-[11px] xl:text-sm transition-all px-1 ${hasText ? 'bg-white border text-black hover:bg-gray-50' : btnClassDis}`;
      btnD.className = `flex flex-col xl:flex-row items-center justify-center gap-1 xl:gap-2 py-2 rounded-lg font-bold text-[11px] xl:text-sm transition-all px-1 ${hasText ? btnClassAct : btnClassDis}`;
      
      btnC.disabled = !hasText;
      btnD.disabled = !hasText;
    }

    function addBox() { boxes.push({ id: generateId(), text: "" }); renderBoxes(); }
    function removeBox(id) { 
      if(boxes.length <= 1) { boxes = [{ id: generateId(), text: "" }]; }
      else { boxes = boxes.filter(b => b.id !== id); }
      renderBoxes(); 
    }
    function clearBox(id) { 
      boxes = boxes.map(b => b.id === id ? {...b, text: ""} : b);
      // Evita renderizar a lista inteira e fechar o teclado no celular atualizando direto o box
      document.getElementById(`ta-${id}`).value = ''; 
      updateResult();
    }
    function updateText(id, val) {
      boxes = boxes.map(b => b.id === id ? {...b, text: val} : b);
      updateResult();
    }
    function toggleBoxExpand(id) {
      if(expandedBoxes.includes(id)) expandedBoxes = expandedBoxes.filter(x => x !== id);
      else expandedBoxes.push(id);
      renderBoxes();
    }

    function saveToHistory() {
      const unionName = document.getElementById('union-name').value;
      const combined = getCombinedText();
      if(!combined) return;

      if(historyData.length > 0) {
        const latest = historyData[0].boxes.map(b => b.text).filter(t => t.trim() !== "").join("\n\n");
        if(latest === combined && historyData[0].name === unionName) return;
      }
      historyData.unshift({ id: generateId(), name: unionName, boxes: JSON.parse(JSON.stringify(boxes)), timestamp: Date.now() });
      saveHistoryToStorage();
    }

    function handleCopy() {
      navigator.clipboard.writeText(getCombinedText());
      document.getElementById('txt-copy').innerText = "Copiado!";
      saveToHistory();
      setTimeout(() => { document.getElementById('txt-copy').innerText = "Copiar"; }, 2000);
    }
    function handleDownload() {
      const name = document.getElementById('union-name').value || "documento";
      const blob = new Blob([getCombinedText()], { type: "text/plain;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `${name}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      saveToHistory();
    }

    // Modal Histórico
    function openHistory() {
      document.getElementById('modal-history').classList.remove('hidden');
      document.getElementById('modal-history').classList.add('flex');
      renderHistory();
    }
    function closeHistory() {
      document.getElementById('modal-history').classList.add('hidden');
      document.getElementById('modal-history').classList.remove('flex');
    }
    
    function toggleHistoryExpand(id, e) {
      e.stopPropagation();
      if(expandedHistory.includes(id)) expandedHistory = expandedHistory.filter(x => x !== id);
      else expandedHistory.push(id);
      renderHistory();
    }
    
    function deleteHistory(id, e) {
      e.stopPropagation();
      if(confirm('Excluir texto histórico?')){
        historyData = historyData.filter(h => h.id !== id);
        saveHistoryToStorage();
        renderHistory();
      }
    }
    
    function restoreHistory(id, e) {
      e.stopPropagation();
      const item = historyData.find(h => h.id === id);
      if(item) {
        boxes = JSON.parse(JSON.stringify(item.boxes));
        document.getElementById('union-name').value = item.name || "Meus_Textos";
        closeHistory();
        renderBoxes();
      }
    }

    function renderHistory() {
      const c = document.getElementById('history-container');
      c.innerHTML = '';
      if(historyData.length === 0){
        c.innerHTML = `<div class="flex flex-col items-center py-12 text-gray-400 gap-4"><i data-lucide="clock" class="w-10 h-10"></i><p>Nenhum histórico.</p></div>`;
      } else {
        historyData.forEach(h => {
          const isExp = expandedHistory.includes(h.id);
          const fullText = h.boxes.map(b => b.text).filter(t => t.trim() !== "").join("\n\n");
          
          c.innerHTML += `
            <div class="border border-gray-200 rounded-xl p-4 bg-white relative overflow-hidden">
              <div class="flex justify-between items-start mb-2">
                <div class="flex flex-col gap-1">
                  <span class="font-bold text-sm text-gray-800">${h.name || 'Sem nome'}</span>
                  <span class="text-[10px] font-bold text-gray-500 bg-gray-100 px-2 py-0.5 rounded-md flex items-center gap-1 w-max">
                    <i data-lucide="clock" class="w-3 h-3"></i> ${new Date(h.timestamp).toLocaleString()}
                  </span>
                </div>
                <div class="flex gap-2">
                  <button onclick="deleteHistory('${h.id}', event)" class="p-1.5 text-gray-400 hover:text-red-500 rounded"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                  <button onclick="restoreHistory('${h.id}', event)" class="text-xs font-bold bg-black text-white px-3 py-1.5 rounded-lg">Restaurar</button>
                </div>
              </div>
              <div class="mt-3">
                <p class="text-sm text-gray-700 font-medium leading-relaxed ${isExp ? 'whitespace-pre-wrap' : 'line-clamp-3'}">${fullText || 'Vazio'}</p>
                ${fullText.length > 150 ? `<button onclick="toggleHistoryExpand('${h.id}', event)" class="text-xs font-bold text-gray-500 hover:text-black mt-2 bg-gray-100 px-2 py-1 rounded">${isExp ? 'Ver menos' : 'Ver mais'}</button>` : ''}
              </div>
            </div>
          `;
        });
      }
      lucide.createIcons();
    }

    // Init
    document.getElementById('union-name').addEventListener('input', () => {});
    renderBoxes();
  </script>
