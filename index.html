<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unificador de Textos</title>
  
  <!-- Usando Tailwind CSS diretamente pelo CDN Oficial -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Fonte Poppins do Google -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #F8F9FA;
      margin: 0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      color: #111827;
      -webkit-font-smoothing: antialiased;
    }
    
    /* Scrollbar estilizado para manter o design clean */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #9ca3af;
    }

    /* Utilitário para text truncado estilo Tailwind line-clamp-3 */
    .line-clamp-3 {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <!-- Header Fixo e Compacto -->
  <header class="shrink-0 bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between shadow-sm z-10">
    <div class="flex items-center gap-3">
      <div class="bg-black text-white p-1.5 rounded-lg flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
      </div>
      <h1 class="text-lg md:text-xl font-bold tracking-tight text-black">
        Unificador de Textos
      </h1>
    </div>
    <button onclick="openHistory()" class="flex items-center gap-2 text-sm font-bold text-gray-700 bg-gray-100 hover:bg-gray-200 hover:text-black px-3 py-1.5 rounded-lg transition-colors border border-gray-200 focus:outline-none focus:ring-2 focus:ring-black">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
      <span class="hidden sm:inline">Ver Histórico</span>
    </button>
  </header>

  <!-- Área Principal (Sem scroll root) -->
  <main class="flex-1 min-h-0 flex flex-col md:flex-row w-full max-w-[1400px] mx-auto p-2 md:p-4 gap-2 md:gap-4 overflow-hidden">
    
    <!-- Coluna Esquerda: Entradas de Texto -->
    <div class="flex-1 min-h-0 flex flex-col bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
      <div class="shrink-0 px-4 py-2 border-b border-gray-100 bg-gray-50 flex items-center justify-between">
        <span class="font-bold text-sm tracking-wide text-gray-700 uppercase flex items-center gap-2">
          Partes do Texto
          <span id="boxes-count" class="bg-gray-200 text-gray-600 text-[10px] px-2 py-0.5 rounded-full">3</span>
        </span>
        <button onclick="addBox()" class="flex items-center gap-1 text-xs font-bold text-white bg-black hover:bg-gray-800 px-2.5 py-1.5 rounded transition-colors focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-black">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Adicionar
        </button>
      </div>
      
      <!-- Container das Caixas de Texto (com scroll interno em overflow) -->
      <div id="boxes-container" class="flex-1 min-h-0 p-2 overflow-y-auto flex flex-col gap-2 bg-white">
        <!-- Renderizado pelo JS -->
      </div>
    </div>

    <!-- Coluna Direita: Resultado -->
    <div class="flex-1 min-h-0 flex flex-col bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden mt-2 md:mt-0">
      <div class="shrink-0 px-4 py-3 border-b border-gray-100 bg-black text-white flex items-center justify-between gap-2">
        <div class="flex items-center gap-2 flex-1">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" class="shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="6" x2="3" y2="6"/><line x1="15" y1="12" x2="3" y2="12"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
          <input 
            type="text" 
            id="union-name" 
            value="Meus_Textos_Unidos"
            oninput="updateUnionName(this.value)"
            placeholder="Nome da união (ex: Meus_Textos)"
            class="bg-transparent border-b border-transparent focus:border-gray-500 w-full outline-none font-bold text-sm transition-colors placeholder:text-gray-400"
          />
        </div>
        <span id="total-chars" class="text-xs font-mono bg-gray-800 px-2 py-0.5 rounded text-gray-300 shrink-0">
          0 caracteres
        </span>
      </div>

      <div id="result-container" class="flex-1 min-h-0 p-4 overflow-y-auto bg-gray-50 flex flex-col">
          <!-- O texto combinado ou placeholder preenche aqui usando JS -->
      </div>

      <div class="shrink-0 p-3 bg-white border-t border-gray-200 grid grid-cols-2 gap-2">
        <button id="btn-copy" onclick="copyText()" disabled class="flex flex-col xl:flex-row items-center justify-center gap-1 xl:gap-2 py-2 rounded-lg font-bold text-[11px] xl:text-sm transition-all focus:outline-none focus:ring-2 focus:ring-black px-1 bg-gray-100 text-gray-400 cursor-not-allowed">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span id="btn-copy-label" class="truncate">Copiar</span>
        </button>
        <button id="btn-download" onclick="downloadText()" disabled class="flex flex-col xl:flex-row items-center justify-center gap-1 xl:gap-2 py-2 rounded-lg font-bold text-[11px] xl:text-sm transition-all border border-gray-100 outline-none focus:ring-2 focus:ring-black px-1 bg-gray-50 text-gray-300 cursor-not-allowed">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span class="truncate">Baixar .txt</span>
        </button>
      </div>
    </div>
  </main>

  <!-- Modal de Histórico -->
  <div id="history-modal" onclick="closeHistory()" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm transition-opacity duration-200 hidden opacity-0">
    <div id="history-modal-content" onclick="event.stopPropagation()" class="bg-white rounded-2xl w-full max-w-xl shadow-2xl flex flex-col max-h-[85vh] overflow-hidden transition-transform duration-200 scale-95 translate-y-4">
      
      <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 bg-gray-50">
        <h2 class="font-bold text-lg flex items-center gap-2 text-black">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg> 
          Histórico de Textos Salvos
        </h2>
        <button onclick="closeHistory()" class="p-1.5 text-gray-500 hover:text-black hover:bg-gray-200 rounded-lg transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      
      <div id="history-list" class="flex-1 overflow-y-auto p-4 space-y-3 bg-white">
        <!-- Itens do histórico rendenrizados aqui -->
      </div>

    </div>
  </div>

  <script>
    // --- ESTADO INICIAL ---
    const generateId = () => Math.random().toString(36).substring(2, 9);
    
    let state = {
      boxes: [
        { id: generateId(), text: "" },
        { id: generateId(), text: "" },
        { id: generateId(), text: "" }
      ],
      unionName: "Meus_Textos_Unidos",
      history: [],
      deleteConfirmId: null,
      expandedHistoryIds: [],
      copied: false
    };

    // Ícones em String para Re-utilização Rápida no Render
    const icons = {
      trash: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>`,
      eraser: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>`,
      clock: `<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
      clockLg: `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
      fileTextSm: `<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>`,
      fileTextLg: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>`
    };

    // --- CARREGAMENTO INICIAL ---
    function init() {
      const saved = localStorage.getItem("textJoinerHistory");
      if (saved) {
        try { state.history = JSON.parse(saved); } catch (e) {}
      }
      renderApp();
    }

    // --- FUNÇÕES DE LÓGICA E ESTADO ---
    function saveStateAndRender() {
      localStorage.setItem("textJoinerHistory", JSON.stringify(state.history));
      renderApp();
    }

    function addBox() {
      state.boxes.push({ id: generateId(), text: "" });
      renderApp();
      // Scroll pra baixo automaticamente na lista
      const container = document.getElementById("boxes-container");
      setTimeout(() => container.scrollTop = container.scrollHeight, 10);
    }

    function removeBox(id) {
      if (state.boxes.length <= 1) {
        state.boxes = [{ id: generateId(), text: "" }];
      } else {
        state.boxes = state.boxes.filter(b => b.id !== id);
      }
      renderApp();
    }

    function clearBox(id) {
      state.boxes = state.boxes.map(b => b.id === id ? { ...b, text: "" } : b);
      renderApp();
    }

    function handleTextChange(id, value) {
      state.boxes = state.boxes.map(b => b.id === id ? { ...b, text: value } : b);
      renderApp();
    }

    function updateUnionName(value) {
      state.unionName = value;
      // Não re-renderiza todo o app aqui para não perder foco no input
    }

    function getCombinedText() {
      return state.boxes.map(b => b.text).filter(t => t.trim() !== "").join("\n\n");
    }

    function saveToHistory() {
      const combined = getCombinedText();
      if (!combined) return;

      if (state.history.length > 0) {
        const latestCombined = state.history[0].boxes.map(b => b.text).filter(t => t.trim() !== "").join("\n\n");
        if (latestCombined === combined && state.history[0].name === state.unionName) return; // Evita salvar duplicata identica debaixo da outra
      }

      state.history.unshift({
        id: generateId(),
        name: state.unionName,
        boxes: JSON.parse(JSON.stringify(state.boxes)), // Clonagem profunda simples
        timestamp: Date.now()
      });
      saveStateAndRender();
    }

    async function copyText() {
      const text = getCombinedText();
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        state.copied = true;
        saveToHistory(); // Já chama renderApp
        setTimeout(() => {
          state.copied = false;
          renderApp();
        }, 2000);
      } catch (e) {
        console.error("Erro ao copiar", e);
      }
    }

    function downloadText() {
      const text = getCombinedText();
      if (!text) return;
      
      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${state.unionName || "documento"}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      saveToHistory();
    }

    // --- FUNÇÕES DO MODAL HISTÓRICO ---
    function openHistory() {
      state.deleteConfirmId = null;
      const modal = document.getElementById("history-modal");
      const modalContent = document.getElementById("history-modal-content");
      
      modal.classList.remove("hidden");
      // Animando a entrada
      requestAnimationFrame(() => {
        modal.classList.remove("opacity-0");
        modalContent.classList.remove("scale-95", "translate-y-4");
      });
      renderHistory();
    }

    function closeHistory() {
      state.deleteConfirmId = null;
      const modal = document.getElementById("history-modal");
      const modalContent = document.getElementById("history-modal-content");
      
      modal.classList.add("opacity-0");
      modalContent.classList.add("scale-95", "translate-y-4");
      
      setTimeout(() => {
        modal.classList.add("hidden");
      }, 200);
    }

    function restoreHistoryItem(id, ev) {
      ev.stopPropagation();
      const item = state.history.find(i => i.id === id);
      if (item) {
        state.boxes = JSON.parse(JSON.stringify(item.boxes));
        state.unionName = item.name || "Meus_Textos_Unidos";
        document.getElementById("union-name").value = state.unionName;
        closeHistory();
        renderApp();
      }
    }

    function confirmDeleteReq(id, ev) {
      ev.stopPropagation();
      state.deleteConfirmId = id;
      renderHistory();
    }

    function executeDeleteHistory(id, ev) {
      ev.stopPropagation();
      state.history = state.history.filter(i => i.id !== id);
      state.deleteConfirmId = null;
      saveStateAndRender();
      renderHistory();
    }

    function cancelDeleteHistory(ev) {
      ev.stopPropagation();
      state.deleteConfirmId = null;
      renderHistory();
    }

    function toggleExpand(id, ev) {
      ev.stopPropagation();
      if (state.expandedHistoryIds.includes(id)) {
        state.expandedHistoryIds = state.expandedHistoryIds.filter(i => i !== id);
      } else {
        state.expandedHistoryIds.push(id);
      }
      renderHistory();
    }

    // --- RENDERIZADORES DO DOM ---
    function renderApp() {
      document.getElementById("boxes-count").innerText = state.boxes.length;
      const combinedText = getCombinedText();
      
      // Update Inputs
      const boxesContainer = document.getElementById("boxes-container");
      boxesContainer.innerHTML = state.boxes.map((box, idx) => `
        <div class="flex-1 min-h-[90px] flex flex-col bg-white border border-gray-200 rounded-lg overflow-hidden focus-within:border-black focus-within:ring-1 focus-within:ring-black shadow-sm shrink-0">
          <div class="shrink-0 bg-gray-50 py-1.5 px-3 border-b border-gray-100 flex justify-between items-center transition-colors">
            <div class="flex items-center gap-2">
              <span class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Bloco ${idx + 1}</span>
              <span class="text-[10px] font-mono bg-gray-200 px-1.5 py-0.5 rounded text-gray-600 font-bold">${box.text.length} caracteres</span>
            </div>
            <div class="flex items-center gap-2">
              <button onclick="clearBox('${box.id}')" class="text-gray-400 hover:text-black transition-colors" title="Esvaziar">
                ${icons.eraser}
              </button>
              <button onclick="removeBox('${box.id}')" class="text-gray-400 hover:text-black transition-colors" title="Remover">
                ${icons.trash}
              </button>
            </div>
          </div>
          <textarea
            oninput="handleTextChange('${box.id}', this.value)"
            placeholder="Digite ou cole um texto aqui..."
            class="flex-1 w-full p-2 lg:p-3 resize-none outline-none text-gray-800 text-sm leading-relaxed"
          >${box.text}</textarea>
        </div>
      `).join("");

      // Update Result View
      document.getElementById("total-chars").innerText = `${combinedText.length} caracteres`;
      const resultContainer = document.getElementById("result-container");
      if (combinedText) {
        resultContainer.innerHTML = `<div class="flex-1 text-sm font-mono text-gray-800 whitespace-pre-wrap leading-relaxed outline-none">${combinedText.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>`;
      } else {
        resultContainer.innerHTML = `
          <div class="flex-1 flex flex-col items-center justify-center text-gray-400 gap-3">
            ${icons.fileTextLg.replace('stroke="currentColor"', 'stroke="#d1d5db"')}
            <p class="text-sm font-medium text-center">Os textos unidos aparecerão aqui...</p>
          </div>
        `;
      }

      // Update Buttons States
      const btnCopy = document.getElementById("btn-copy");
      const btnDownload = document.getElementById("btn-download");
      const btnCopyLabel = document.getElementById("btn-copy-label");

      if (!combinedText) {
        btnCopy.disabled = true;
        btnDownload.disabled = true;
        btnCopy.className = "flex flex-col xl:flex-row items-center justify-center gap-1 xl:gap-2 py-2 rounded-lg font-bold text-[11px] xl:text-sm transition-all focus:outline-none focus:ring-2 focus:ring-black px-1 bg-gray-100 text-gray-400 cursor-not-allowed border border-gray-100";
        btnDownload.className = "flex flex-col xl:flex-row items-center justify-center gap-1 xl:gap-2 py-2 rounded-lg font-bold text-[11px] xl:text-sm transition-all border outline-none focus:ring-2 focus:ring-black px-1 bg-gray-50 text-gray-300 border-gray-100 cursor-not-allowed";
        btnCopyLabel.innerText = "Copiar";
      } else {
        btnCopy.disabled = false;
        btnDownload.disabled = false;
        btnDownload.className = "flex flex-col xl:flex-row items-center justify-center gap-1 xl:gap-2 py-2 rounded-lg font-bold text-[11px] xl:text-sm transition-all border outline-none focus:ring-2 focus:ring-black px-1 bg-white text-black hover:bg-gray-50 border-gray-300 shadow-sm";
        
        if (state.copied) {
          btnCopy.className = "flex flex-col xl:flex-row items-center justify-center gap-1 xl:gap-2 py-2 rounded-lg font-bold text-[11px] xl:text-sm transition-all focus:outline-none focus:ring-2 focus:ring-black px-1 bg-black text-white border border-black";
          btnCopyLabel.innerText = "Copiado!";
        } else {
          btnCopy.className = "flex flex-col xl:flex-row items-center justify-center gap-1 xl:gap-2 py-2 rounded-lg font-bold text-[11px] xl:text-sm transition-all focus:outline-none focus:ring-2 focus:ring-black px-1 bg-gray-100 hover:bg-gray-200 text-black border border-gray-200";
          btnCopyLabel.innerText = "Copiar";
        }
      }
    }

    function renderHistory() {
      const historyContainer = document.getElementById("history-list");
      
      if (state.history.length === 0) {
        historyContainer.innerHTML = `
          <div class="flex flex-col items-center justify-center py-12 text-gray-400 gap-4">
            ${icons.clockLg.replace('stroke="currentColor"', 'stroke="#d1d5db"')}
            <p class="text-center font-medium">Nenhuma unificação salva no momento.<br/>
              <span class="text-sm font-normal">Sempre que você copia ou salva um arquivo, ele fica guardado aqui.</span>
            </p>
          </div>
        `;
        return;
      }

      historyContainer.innerHTML = state.history.map(item => {
        const fullText = item.boxes.map(b => b.text).filter(t => t.trim() !== "").join("\n\n").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const isExpanded = state.expandedHistoryIds.includes(item.id);
        const isConfirming = state.deleteConfirmId === item.id;
        const itemName = item.name || "Texto sem nome";
        const isClickable = (!isExpanded && !isConfirming) ? `onclick="restoreHistoryItem('${item.id}', event)" class="group border border-gray-200 rounded-xl p-4 hover:border-black cursor-pointer transition-all bg-white hover:shadow-md relative overflow-hidden"` : `class="group border border-gray-200 rounded-xl p-4 transition-all bg-white hover:shadow-md hover:border-black relative overflow-hidden"`;

        return `
          <div ${isClickable}>
            ${isConfirming ? `
              <div class="absolute inset-0 bg-white/95 backdrop-blur-sm z-10 flex flex-col justify-center items-center p-4">
                <p class="text-[13px] leading-tight font-bold text-gray-800 mb-3 text-center">Tem certeza que deseja excluir esse texto unificado?</p>
                <div class="flex gap-2">
                  <button onclick="executeDeleteHistory('${item.id}', event)" class="px-3 py-1.5 bg-black text-white text-[11px] font-bold rounded-lg hover:bg-red-600 transition-colors">Sim</button>
                  <button onclick="cancelDeleteHistory(event)" class="px-3 py-1.5 bg-gray-200 text-black text-[11px] font-bold rounded-lg hover:bg-gray-300 transition-colors">Não</button>
                </div>
              </div>` : ''
            }
            <div class="flex justify-between items-start mb-2">
              <div class="flex flex-col">
                <span class="font-bold text-sm text-gray-800 mb-1">${itemName}</span>
                <span class="text-[10px] font-bold text-gray-500 bg-gray-100 px-2 py-0.5 rounded-md self-start flex items-center gap-1">
                  ${icons.clock}
                  ${new Date(item.timestamp).toLocaleString()}
                </span>
              </div>
              <div class="flex items-center gap-2">
                <button onclick="confirmDeleteReq('${item.id}', event)" class="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors opacity-100 sm:opacity-0 group-hover:opacity-100" title="Excluir">
                  ${icons.trash}
                </button>
                <button onclick="restoreHistoryItem('${item.id}', event)" class="text-xs font-bold bg-black text-white px-3 py-1.5 rounded-lg opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">
                  Restaurar
                </button>
              </div>
            </div>

            <div class="mt-3">
              <p class="text-sm text-gray-700 font-medium leading-relaxed ${isExpanded ? 'whitespace-pre-wrap' : 'line-clamp-3'}">
                ${fullText || "Cópia vazia..."}
              </p>
              ${fullText.length > 150 ? `
                <button onclick="toggleExpand('${item.id}', event)" class="text-xs font-bold text-gray-500 hover:text-black mt-2 flex items-center bg-gray-100 px-2 py-1 rounded">
                  ${isExpanded ? "Ver menos" : "Ver mais"}
                </button>
              ` : ''}
            </div>

            <div class="mt-3 text-[10px] font-bold text-gray-400 uppercase tracking-widest flex items-center gap-1 border-t border-gray-100 pt-3">
              ${icons.fileTextSm}
              ${item.boxes.length} Partes originais preservadas
            </div>
          </div>
        `;
      }).join("");
    }

    // Inicializa a aplicação ao carregar a página
    window.onload = init;

  </script>
</body>
</html>
