<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unificador de Textos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="h-[100dvh] w-full flex flex-col bg-[#F8F9FA] overflow-hidden text-gray-900">

  <!-- Header Fixo e Compacto -->
  <header class="shrink-0 bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between shadow-sm z-10">
    <div class="flex items-center gap-3">
      <div class="bg-black text-white p-1.5 rounded-lg flex items-center justify-center">
        <i data-lucide="file-text" class="w-5 h-5"></i>
      </div>
      <h1 class="text-lg md:text-xl font-bold tracking-tight text-black">Unificador de Textos</h1>
    </div>
    <button id="btn-open-history" class="flex items-center gap-2 text-sm font-bold text-gray-700 bg-gray-100 hover:bg-gray-200 hover:text-black px-3 py-1.5 rounded-lg transition-colors border border-gray-200 focus:outline-none focus:ring-2 focus:ring-black">
      <i data-lucide="history" class="w-4 h-4"></i>
      <span class="hidden sm:inline">Ver Histórico</span>
    </button>
  </header>

  <!-- Área Principal -->
  <main class="flex-1 min-h-0 flex flex-col md:flex-row w-full max-w-[1400px] mx-auto p-2 md:p-4 gap-2 md:gap-4 overflow-hidden">
    
    <!-- Coluna Esquerda: Entradas de Texto -->
    <div class="flex-1 min-h-0 flex flex-col bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
      <div class="shrink-0 px-4 py-2 border-b border-gray-100 bg-gray-50 flex items-center justify-between">
        <span class="font-bold text-sm tracking-wide text-gray-700 uppercase flex items-center gap-2">
          Partes do Texto
          <span id="box-count-badge" class="bg-gray-200 text-gray-600 text-[10px] px-2 py-0.5 rounded-full">3</span>
        </span>
        <button id="btn-add-box" class="flex items-center gap-1 text-xs font-bold text-white bg-black hover:bg-gray-800 px-2.5 py-1.5 rounded transition-colors focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-black">
          <i data-lucide="plus" class="w-3.5 h-3.5"></i> Adicionar
        </button>
      </div>
      
      <div id="boxes-container" class="flex-1 min-h-0 p-2 overflow-y-auto flex flex-col gap-2 bg-white">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Coluna Direita: Resultado -->
    <div class="flex-1 min-h-0 flex flex-col bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden mt-2 md:mt-0">
      <div class="shrink-0 px-4 py-3 border-b border-gray-100 bg-black text-white flex items-center justify-between gap-2">
        <div class="flex items-center gap-2 flex-1">
          <i data-lucide="align-left" class="w-4 h-4 shrink-0"></i>
          <input id="input-union-name" type="text" value="Meus_Textos_Unidos" placeholder="Nome da união (ex: Meus_Textos)" class="bg-transparent border-b border-transparent focus:border-gray-500 w-full outline-none font-bold text-sm transition-colors placeholder:text-gray-400">
        </div>
        <span id="combined-char-count" class="text-xs font-mono bg-gray-800 px-2 py-0.5 rounded text-gray-300 shrink-0">0 caracteres</span>
      </div>

      <div class="flex-1 min-h-0 p-4 overflow-y-auto bg-gray-50 flex flex-col">
        <div id="combined-text-display" class="flex-1 text-sm font-mono text-gray-800 whitespace-pre-wrap leading-relaxed outline-none hidden"></div>
        
        <div id="empty-state-display" class="flex-1 flex flex-col items-center justify-center text-gray-400 gap-3">
          <i data-lucide="file-text" class="w-8 h-8 text-gray-300"></i>
          <p class="text-sm font-medium text-center">Os textos unidos aparecerão aqui...</p>
        </div>
      </div>

      <div class="shrink-0 p-3 bg-white border-t border-gray-200 grid grid-cols-2 gap-2">
        <button id="btn-copy" disabled class="flex flex-col xl:flex-row items-center justify-center gap-1 xl:gap-2 py-2 rounded-lg font-bold text-[11px] xl:text-sm transition-all focus:outline-none focus:ring-2 focus:ring-black px-1 bg-gray-100 text-gray-400 cursor-not-allowed">
          <i data-lucide="copy" class="w-4 h-4"></i>
          <span id="txt-copy" class="truncate">Copiar</span>
        </button>
        <button id="btn-download" disabled class="flex flex-col xl:flex-row items-center justify-center gap-1 xl:gap-2 py-2 rounded-lg font-bold text-[11px] xl:text-sm transition-all border outline-none focus:ring-2 focus:ring-black px-1 bg-gray-50 text-gray-300 border-gray-100 cursor-not-allowed">
          <i data-lucide="download" class="w-4 h-4"></i>
          <span class="truncate">Baixar .txt</span>
        </button>
      </div>
    </div>

  </main>

  <!-- Modal de Histórico -->
  <div id="history-modal" class="fixed inset-0 z-50 items-center justify-center p-4 bg-black/40 backdrop-blur-sm hidden" onclick="closeHistory()">
    <div class="bg-white rounded-2xl w-full max-w-xl shadow-2xl flex flex-col max-h-[85vh] overflow-hidden" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 bg-gray-50">
        <h2 class="font-bold text-lg flex items-center gap-2 text-black">
          <i data-lucide="history" class="w-5 h-5"></i>
          Histórico de Textos Salvos
        </h2>
        <button id="btn-close-history" class="p-1.5 text-gray-500 hover:text-black hover:bg-gray-200 rounded-lg transition-colors" onclick="closeHistory()">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      
      <div id="history-container" class="flex-1 overflow-y-auto p-4 space-y-3 bg-white">
        <!-- Rendered by JS -->
      </div>
    </div>
  </div>

  <script>

    let boxes = [
      { id: generateId(), text: "" },
      { id: generateId(), text: "" },

      boxCountBadge: document.getElementById('box-count-badge'),
      unionNameInput: document.getElementById('input-union-name'),
      combinedCharCount: document.getElementById('combined-char-count'),
      combinedTextDisplay: document.getElementById('combined-text-display'),
      emptyStateDisplay: document.getElementById('empty-state-display'),
      btnCopy: document.getElementById('btn-copy'),
      txtCopy: document.getElementById('txt-copy'),
